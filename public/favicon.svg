<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 8" shape-rendering="crispEdges">
  <!-- Top arc -->
  <rect x="2" y="1" width="4" height="1" fill="#5de5f5" />
  <rect x="1" y="2" width="2" height="1" fill="#5de5f5" />
  
  <!-- Middle curve -->
  <rect x="2" y="3" width="3" height="1" fill="#c084fc" />
  <rect x="4" y="4" width="2" height="1" fill="#c084fc" />
  
  <!-- Bottom arc -->
  <rect x="1" y="5" width="2" height="1" fill="#ff7eb3" />
  <rect x="2" y="6" width="4" height="1" fill="#ff7eb3" />
</svg>
